<script>

function openLogin(){

page1.classList.remove("active");

page2.classList.add("active");

}

function login(){

if(key.value=="ZXSCOOBY333"){

page2.classList.remove("active");

page3.classList.add("active");

device.innerHTML=navigator.userAgent;

bar.style.width="100%";

setTimeout(generate,2000);

}

else{

alert("Wrong License");

}

}

function random(){

return Math.floor(Math.random()*51)+150;

}

function generate(){

g.innerHTML=random();

r.innerHTML=random();

s2.innerHTML=random();

s4.innerHTML=random();

sn.innerHTML=Math.floor(Math.random()*40)+60;

fl.innerHTML=200;

}

const canvas=document.getElementById("bg");

const ctx=canvas.getContext("2d");

canvas.width=innerWidth;

canvas.height=innerHeight;

let p=[];

for(let i=0;i<120;i++){

p.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

r:Math.random()*2,

d:Math.random()*2

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00cfff";

for(let i of p){

ctx.beginPath();

ctx.arc(i.x,i.y,i.r,0,6.28);

ctx.fill();

i.y+=i.d;

if(i.y>canvas.height)i.y=0;

}

requestAnimationFrame(draw);

}

draw();

</script>
